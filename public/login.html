<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-xl shadow-gray-200/50 border border-gray-100">
        <div class="text-center mb-10">
            <a href="/" class="text-blue-600 font-bold text-sm hover:underline">← Back to Home</a>
            <h2 class="text-3xl font-bold text-gray-900 mt-4">Welcome Back</h2>
            <p class="text-gray-500 mt-2">Sign in to access your dashboard</p>
        </div>

        <form action="#" class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Email Address</label>
                <input type="email" required 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-gray-100 focus:border-blue-500 focus:bg-white outline-none transition" 
                    placeholder="student@university.edu">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 ml-1">Password</label>
                <input type="password" required 
                    class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-gray-100 focus:border-blue-500 focus:bg-white outline-none transition" 
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-blue-600 shadow-lg transition-all duration-300 transform hover:-translate-y-1">
                Sign In
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-500">
            Don't have an account? <a href="#" class="text-blue-600 font-bold">Sign up</a>
        </p>
    </div>

</body>
</html>
