<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow | Smart Learning Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="panicBanner" class="py-2 text-center text-white text-[10px] font-bold uppercase tracking-widest">
        ⚠️ Panic Mode Active: Only Revision One-Shots & Cheat Sheets Showing
    </div>

    <nav class="sticky top-0 z-50 glass border-b border-gray-100 py-4 transition-all">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <div id="logo" class="text-2xl font-bold tracking-tighter text-blue-600">EduFlow.</div>
            <div class="flex items-center space-x-6">
                <a href="/login" class="text-sm font-medium hover:text-blue-600">Login</a>
                <div class="flex items-center space-x-2 bg-gray-100 p-1 rounded-full px-3">
                    <span class="text-[9px] font-bold text-gray-400 uppercase">Panic</span>
                    <button id="panicToggle" class="w-10 h-5 bg-gray-300 rounded-full p-1 transition relative">
                        <div class="dot w-3 h-3 bg-white rounded-full shadow-md transform transition duration-300"></div>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 py-16 text-center">
        <h1 class="text-5xl md:text-6xl font-bold mb-4 tracking-tight">Your Exams, <span class="text-blue-600">Simplified.</span></h1>
        <p class="text-gray-500 mb-10 max-w-xl mx-auto">Search for courses, tie-up with PW & Unacademy for low prices, or get free curated YouTube revision paths.</p>
        
        <div class="max-w-3xl mx-auto space-y-4">
            <!-- LIVE SEARCH BAR -->
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Search for 'JEE', 'B.Tech', 'UPSC' or 'Physics Wallah'..." 
                    class="w-full px-8 py-5 rounded-[2rem] border border-gray-100 shadow-2xl shadow-gray-200/50 outline-none focus:border-blue-500 transition-all text-gray-700">
            </div>

            <!-- DYNAMIC FILTERS -->
            <div class="flex flex-wrap justify-center items-center gap-6 bg-white p-4 rounded-[2.5rem] shadow-lg shadow-gray-100/50 border border-gray-50">
                <div class="flex flex-col items-start px-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Stream</label>
                    <select id="streamFilter" class="bg-transparent font-semibold text-gray-800 outline-none">
                        <option value="">All Streams</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="Medical">Medical / NEET</option>
                        <option value="Commerce">Commerce / CA</option>
                        <option value="UPSC">UPSC</option>
                        <option value="Boards">School Boards</option>
                    </select>
                </div>
                <div id="filterDivider" class="w-px h-8 bg-gray-200 hidden md:block"></div>
                <div id="semWrapper" class="flex flex-col items-start px-2">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Semester</label>
                    <select id="semesterFilter" class="bg-transparent font-semibold text-gray-800 outline-none">
                        <option value="">Select Sem</option>
                        <option value="1">Sem 1</option><option value="2">Sem 2</option><option value="3">Sem 3</option><option value="4">Sem 4</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="courseGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
